{% extends 'store/main.html' %}
{% load static %}
{% block content %}

<!-- Hero Banner -->
<div class="hero-banner">
	<h1>🛒 Gulf Store</h1>
	<p>Premium products delivered across the UAE</p>
	<a href="#products" class="btn-hero">Shop Now</a>
</div>

<!-- Products -->
<div class="row" id="products">
	{% for product in products %}
	<div class="col-lg-4 col-md-6">
		<div class="product-card">
			<img src="{{product.imageURL}}" alt="{{product.name}}">
			<div class="product-card-body">
				<h6>{{product.name}}</h6>
				<hr>
				<div style="display:flex; justify-content:space-between; align-items:center;">
					<div>
						<button data-product="{{product.id}}" data-action="add" class="btn btn-outline-secondary btn-sm update-cart">Add to Cart</button>
						<a class="btn btn-success btn-sm" href="{% url 'checkout' %}">Buy</a>
					</div>
					<span class="product-price">AED {{product.price}}</span>
				</div>
			</div>
		</div>
	</div>
	{% endfor %}
</div>

{% endblock content %}
